[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /api/claude → Netlify Function
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

# SPA fallback (opzionale)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
